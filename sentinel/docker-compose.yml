services:
  dashboard:
    build: ./dashboard
    container_name: sentinel_dashboard
    ports:
      - "8501:8501"
    environment:
      - REDIS_HOST=redis
    depends_on:
      redis:
        condition: service_healthy
  redis:
    image: redis:alpine
    container_name: sentinel_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api-gateway:
    build: ./api-gateway
    container_name: sentinel_api
    ports:
      - "3000:3000"
    environment:
      - REDIS_HOST=redis
    depends_on:
      redis:
        condition: service_healthy

  stream-worker:
    build: ./stream-worker
    container_name: sentinel_worker
    environment:
      - REDIS_HOST=redis
    depends_on:
      redis:
        condition: service_healthy

  inference-service:
    build: ./inference-service
    container_name: sentinel_judge
    ports:
      - "3001:3001"
    environment:
      - REDIS_HOST=redis
    depends_on:
      redis:
        condition: service_healthy